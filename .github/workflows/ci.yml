name: CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  test-and-build:
    name: Test and build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build test image
        run: docker compose build tests

      - name: Run tests
        run: docker compose run --rm tests

      - name: Run Ruff
        run: docker compose run --rm tests ruff check .

      - name: Build runtime image
        run: docker compose build rocket-landing

      - name: Run CLI help smoke test
        run: docker run --rm rocket-landing-lab:0.1.0 --help

      - name: Run baseline and quality gate smoke test
        run: |
          docker run --rm \
            --entrypoint sh \
            rocket-landing-lab:0.1.0 \
            -c "python -m rocket_landing baseline --episodes 2 --max-steps 20 && python -m rocket_landing check-quality --minimum-mean-reward -1000 --maximum-truncated 2"